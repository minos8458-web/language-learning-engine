name: PostgreSQL tests

on:
  push:
    branches:
      - ac-016-learning-flow-validation-20260720
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lle_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: lle_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Record runtime versions
        run: |
          node --version
          psql --version
          psql -Atqc "SELECT version();"
      - run: npm ci
      - run: npm run migrate
      - run: npm test
